<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Process Payment</title>
   <link rel="stylesheet" href="./css/style.css">
   <style>
      :root {
         color-scheme: light;
         --pay-bg: #f4f7fb;
         --pay-card: #ffffff;
         --pay-text: #172033;
         --pay-muted: #637083;
         --pay-line: #d9e1ec;
         --pay-primary: #2563eb;
         --pay-primary-dark: #1d4ed8;
         --pay-danger: #b42318;
      }

      body {
         min-height: 100vh;
         margin: 0;
         padding: 32px 18px;
         font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background:
            radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 34rem),
            var(--pay-bg);
         color: var(--pay-text);
         display: grid;
         place-items: center;
      }

      main {
         width: min(100%, 720px);
         background: var(--pay-card);
         border: 1px solid rgba(217, 225, 236, 0.9);
         border-radius: 16px;
         box-shadow: 0 24px 70px rgba(23, 32, 51, 0.14);
         padding: clamp(22px, 4vw, 40px);
      }

      h1 {
         margin: 0 0 10px;
         color: var(--pay-text);
         font-size: clamp(1.7rem, 4vw, 2.4rem);
      }

      .lede {
         margin: 0 0 24px;
         color: var(--pay-muted);
      }

      .payment-details {
         margin-bottom: 24px;
         padding: 20px;
         border: 1px solid var(--pay-line);
         border-radius: 12px;
         background: #fbfdff;
      }

      .payment-details h2 {
         margin: 0 0 16px;
         color: var(--pay-text);
         font-size: 1.15rem;
      }

      .detail-row {
         display: flex;
         justify-content: space-between;
         gap: 18px;
         padding: 12px 0;
         border-bottom: 1px solid var(--pay-line);
      }

      .detail-row:last-of-type {
         border-bottom: 0;
      }

      .detail-row strong {
         color: var(--pay-muted);
         font-weight: 600;
      }

      pre {
         max-height: 220px;
         overflow: auto;
         margin: 12px 0 0;
         padding: 14px;
         border-radius: 10px;
         background: #101828;
         color: #e4e7ec;
         white-space: pre-wrap;
         word-break: break-word;
      }

      button {
         border: 0;
         border-radius: 10px;
         padding: 12px 18px;
         margin-right: 10px;
         cursor: pointer;
         font-weight: 700;
         transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      }

      button:hover:not(:disabled) {
         transform: translateY(-1px);
      }

      button:disabled {
         cursor: wait;
         opacity: 0.65;
      }

      #confirm-payment {
         background: var(--pay-primary);
         color: #fff;
         box-shadow: 0 10px 22px rgba(37, 99, 235, 0.28);
      }

      #confirm-payment:hover:not(:disabled) {
         background: var(--pay-primary-dark);
      }

      #cancel-payment {
         background: #eef2f7;
         color: var(--pay-text);
      }

      #status {
         min-height: 1.5em;
         color: var(--pay-muted);
      }

      #error-message {
         color: var(--pay-danger);
         margin-top: 10px;
         font-weight: 600;
      }

      @media (max-width: 560px) {
         .detail-row {
            display: block;
         }

         .actions {
            display: grid;
            gap: 10px;
         }

         button {
            width: 100%;
            margin-right: 0;
         }
      }
   </style>
</head>

<body>
   <main>
      <h1>Confirm Payment</h1>
      <p class="lede">Review the request before sending a response back to the merchant.</p>

      <section class="payment-details" aria-labelledby="payment-info-title">
         <h2 id="payment-info-title">Payment Information</h2>
         <div class="detail-row"><strong>Paying to</strong> <span id="merchant-origin">Unknown</span></div>
         <div class="detail-row"><strong>Total</strong> <span id="payment-total">Not provided</span></div>
         <strong>Method Data</strong>
         <pre id="method-data">No method data provided.</pre>
      </section>

      <div class="actions">
         <button id="confirm-payment">Confirm Payment</button>
         <button id="cancel-payment">Cancel</button>
      </div>

      <p id="status" role="status"></p>
      <p id="error-message" role="alert"></p>
   </main>

   <script src="./js/payment-handler.js"></script>
</body>

</html>
